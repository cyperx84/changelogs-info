name: Update Cheatsheets

on:
  # Run every Sunday at 00:00 UTC
  schedule:
    - cron: '0 0 * * 0'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-cheatsheets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Run cheatsheet update script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm update-cheatsheets

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet src/content/cheatsheets/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Get updated files
        id: updated-files
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          UPDATED_FILES=$(git diff --name-only src/content/cheatsheets/ | sed 's|src/content/cheatsheets/||g' | sed 's|.md||g' | tr '\n' ', ' | sed 's/,$//')
          echo "files=$UPDATED_FILES" >> $GITHUB_OUTPUT

          # Create PR body with details
          echo "## 📝 Cheatsheet Updates" > pr_body.md
          echo "" >> pr_body.md
          echo "The following cheatsheets have been automatically updated from their upstream documentation:" >> pr_body.md
          echo "" >> pr_body.md

          for file in $(git diff --name-only src/content/cheatsheets/); do
            tool=$(basename "$file" .md)
            echo "### \`$tool\`" >> pr_body.md
            echo "" >> pr_body.md

            # Extract "What's New" section if exists
            if grep -q "## What's New" "$file"; then
              sed -n '/## What'"'"'s New/,/^---$/p' "$file" | head -n -1 >> pr_body.md
            fi
            echo "" >> pr_body.md
          done

          echo "" >> pr_body.md
          echo "---" >> pr_body.md
          echo "" >> pr_body.md
          echo "🤖 _This PR was automatically generated by the cheatsheet update pipeline_" >> pr_body.md

      - name: Create Pull Request
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-update cheatsheets (${{ steps.updated-files.outputs.files }})"
          branch: auto-update-cheatsheets-${{ github.run_number }}
          delete-branch: true
          title: "chore: auto-update cheatsheets - ${{ github.run_date }}"
          body-path: pr_body.md
          labels: |
            documentation
            automated
          assignees: ${{ github.repository_owner }}

      - name: No updates needed
        if: steps.check-changes.outputs.has_changes == 'false'
        run: echo "✅ All cheatsheets are up to date!"
