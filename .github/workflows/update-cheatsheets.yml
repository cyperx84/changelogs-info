name: Refresh cheatsheets

on:
  workflow_dispatch:
    inputs:
      tool:
        description: 'Specific tool slug (leave empty for all)'
        required: false
      dry_run:
        description: 'Run without writing files'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-cheatsheets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Refresh cheatsheets
        id: refresh
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_MODEL: 'google/gemini-2.0-flash-001'
        run: |
          TOOL="${{ github.event.inputs.tool }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          ARGS="--summary-file .github/tmp/cheatsheet-refresh-summary.md"
          [ -n "$TOOL" ] && ARGS="$ARGS --tool $TOOL"
          [ "$DRY_RUN" = "true" ] && ARGS="$ARGS --dry-run"
          pnpm cheatsheets:refresh -- $ARGS

      - name: Refresh source state baseline
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          TOOL="${{ github.event.inputs.tool }}"
          ARGS="--write-state"
          [ -n "$TOOL" ] && ARGS="$ARGS --tool $TOOL"
          pnpm cheatsheets:detect -- $ARGS

      - name: Validate cheatsheet JSON
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          node -e "for (const f of ['src/content/cheatsheets-json/openclaw.json','src/content/cheatsheets-json/claude-code.json','src/content/cheatsheets-json/codex-cli.json']) JSON.parse(require('fs').readFileSync(f,'utf8')); console.log('json ok')"
          pnpm build

      - name: Detect changes
        id: changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if git diff --quiet src/content/cheatsheets-json/ scripts/cheatsheet-source-state.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
            git diff --name-only src/content/cheatsheets-json/ scripts/cheatsheet-source-state.json >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        id: pr
        if: ${{ github.event.inputs.dry_run != 'true' && steps.changes.outputs.has_changes == 'true' }}
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: refresh cheatsheets'
          branch: auto/refresh-cheatsheets-${{ github.run_number }}
          delete-branch: true
          title: 'chore: refresh cheatsheets'
          body-path: .github/tmp/cheatsheet-refresh-summary.md
          labels: |
            documentation
            automated

      - name: PR fallback summary
        if: ${{ github.event.inputs.dry_run != 'true' && steps.changes.outputs.has_changes == 'true' && steps.pr.outcome == 'failure' }}
        run: |
          echo 'Pull request creation was blocked by repository permissions.' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo 'Changed files:' >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.changes.outputs.changed_files }}' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          cat .github/tmp/cheatsheet-refresh-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: No changes
        if: ${{ github.event.inputs.dry_run != 'true' && steps.changes.outputs.has_changes == 'false' }}
        run: echo 'No cheatsheet changes detected.'

      - name: Dry run complete
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: cat .github/tmp/cheatsheet-refresh-summary.md
