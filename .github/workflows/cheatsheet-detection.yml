name: Detect cheatsheet source changes

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      tool:
        description: 'Specific tool slug (leave empty for all)'
        required: false

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  detect-cheatsheet-source-changes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect source changes
        id: detect
        run: |
          TOOL="${{ github.event.inputs.tool }}"
          ARGS="--summary-file .github/tmp/cheatsheet-source-detection.md --report-file .github/tmp/cheatsheet-source-detection.json"
          [ -n "$TOOL" ] && ARGS="$ARGS --tool $TOOL"
          pnpm cheatsheets:detect -- $ARGS

      - name: Expose detection outputs
        id: outputs
        run: |
          node <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('.github/tmp/cheatsheet-source-detection.json', 'utf8'));
          const out = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(out, `has_changes=${report.hasChanges}\n`);
          fs.appendFileSync(out, `changed_tools=${report.changedTools.join(',')}\n`);
          fs.appendFileSync(out, `checked_tools=${report.checkedTools.join(',')}\n`);
          NODE

      - name: Upload detection artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cheatsheet-source-detection-${{ github.run_id }}
          path: |
            .github/tmp/cheatsheet-source-detection.md
            .github/tmp/cheatsheet-source-detection.json

      - name: Create or update source-change issue
        if: steps.outputs.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('.github/tmp/cheatsheet-source-detection.json', 'utf8'));
            const summary = fs.readFileSync('.github/tmp/cheatsheet-source-detection.md', 'utf8');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Cheatsheet source changes detected`;
            const body = [
              '## Cheatsheet source changes detected',
              '',
              `Changed tools: ${report.changedTools.join(', ')}`,
              `Checked tools: ${report.checkedTools.join(', ')}`,
              '',
              'Suggested next step:',
              `- Run the manual \`Refresh cheatsheets\` workflow${report.changedTools.length === 1 ? ` for \`${report.changedTools[0]}\`` : ' for the changed tool(s) only'}.`,
              '',
              `Workflow run: ${runUrl}`,
              '',
              summary,
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'cheatsheet-source-change',
              per_page: 20,
            });

            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['cheatsheet-source-change', 'automated'],
              });
            }

      - name: No source changes
        if: steps.outputs.outputs.has_changes != 'true'
        run: cat .github/tmp/cheatsheet-source-detection.md
