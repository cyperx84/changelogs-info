name: Cheatsheet Detection

on:
  schedule:
    # Every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    name: Detect cheatsheet updates

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run detection script
        run: npx tsx scripts/detect-cheatsheet-updates.ts
        continue-on-error: true

      - name: Check for detected updates
        id: check_updates
        run: |
          if [ -f scripts/detection-report.json ]; then
            ITEM_COUNT=$(jq '.toolReports | length' scripts/detection-report.json)
            if [ "$ITEM_COUNT" -gt 0 ]; then
              echo "has_updates=true" >> $GITHUB_OUTPUT
              echo "tool_count=$ITEM_COUNT" >> $GITHUB_OUTPUT
            else
              echo "has_updates=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Create issue for cheatsheet updates
        if: steps.check_updates.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('scripts/detection-report.json', 'utf8'));

            // Build issue body
            let body = `# 📋 Cheatsheet Updates Needed\n\n`;
            body += `Automated detection found **${report.toolReports.length}** tool(s) with potential cheatsheet updates.\n\n`;
            body += `⚠️ **Note:** These are automatically detected from release notes and may require manual review.\n\n`;

            for (const tool of report.toolReports) {
              body += `## ${tool.tool}\n\n`;

              const byType = {};
              for (const item of tool.detectedItems) {
                if (!byType[item.type]) byType[item.type] = [];
                byType[item.type].push(item);
              }

              for (const [type, items] of Object.entries(byType)) {
                body += `### ${type} (${items.length})\n\n`;
                for (const item of items) {
                  const confidence = Math.round(item.confidence * 100);
                  body += `- \`${item.name}\` (${item.release}, confidence: ${confidence}%)\n`;
                }
                body += '\n';
              }

              // Link to cheatsheet
              body += `[📖 View cheatsheet](https://changelogs.info/tools/${tool.tool}/cheatsheet)\n\n`;
            }

            body += `---\n\n`;
            body += `**Action Items:**\n`;
            body += `1. Review detected items in the cheatsheet files\n`;
            body += `2. Update \`src/content/cheatsheets-json/{tool}.json\` with new items\n`;
            body += `3. Set accurate \`added\` dates (YYYY-MM-DD format)\n`;
            body += `4. Update descriptions where needed\n`;
            body += `5. Mark this issue as resolved when complete\n\n`;
            body += `Report generated: ${new Date().toISOString()}\n`;

            // Check if issue already exists for today
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'cheatsheet,needs-review',
              state: 'open',
            });

            const today = new Date().toISOString().split('T')[0];
            const existingIssue = issues.data.find(issue =>
              issue.title.includes(today) ||
              issue.created_at.includes(today)
            );

            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Cheatsheet updates needed for ${today}`,
                body: body,
                labels: ['cheatsheet', 'needs-review', 'automated'],
              });
              console.log('✅ Issue created');
            } else {
              console.log('ℹ️  Issue already exists for today');
            }

      - name: Comment if up to date
        if: steps.check_updates.outputs.has_updates == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            console.log('✅ All cheatsheets appear to be up to date!');
