name: Update changelogs payloads

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      tool:
        description: "Specific tool slug (leave empty for all)"
        required: false
      force_tier2:
        description: "Force Tier 2 extraction even if no version change"
        type: boolean
        default: false

jobs:
  update-payloads:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Run extraction pipeline
        id: pipeline
        env:
          LLM_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_API_URL: "https://openrouter.ai/api/v1"
          LLM_MODEL: "google/gemini-2.0-flash-001"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOOL="${{ github.event.inputs.tool }}"
          FORCE="${{ github.event.inputs.force_tier2 }}"
          ARGS=""
          [ -n "$TOOL" ] && ARGS="--tool $TOOL"
          [ "$FORCE" = "true" ] && ARGS="$ARGS --force-tier2"
          pnpm run pipeline:run -- $ARGS || {
            echo "pipeline_failed=true" >> $GITHUB_OUTPUT
            exit 1
          }
      - name: Commit updated payloads
        if: success()
        run: |
          git config user.name "changelogs-bot"
          git config user.email "bot@changelogs.info"
          git add public/api/refs/
          git diff --staged --quiet || git commit -m "chore: update payloads [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push
      - name: Create failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['pipeline-failure'],
              per_page: 1
            });

            const body = `## Pipeline Failure\n\n` +
              `**Run:** [View logs](${runUrl})\n` +
              `**Trigger:** ${context.eventName}\n` +
              `**Time:** ${new Date().toISOString()}\n\n` +
              `Check the workflow run for error details.`;

            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 Pipeline failure — ${new Date().toISOString().split('T')[0]}`,
                body,
                labels: ['bug', 'pipeline-failure']
              });
            }
