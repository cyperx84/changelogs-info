<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0c0c0c"/>
  <!-- Grid lines -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.6">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>
  <!-- Green accent bar top -->
  <rect x="0" y="0" width="1200" height="3" fill="#33ff33"/>
  <!-- Terminal window chrome -->
  <rect x="60" y="80" width="1080" height="470" rx="8" fill="#111111" stroke="#1e1e1e" stroke-width="1"/>
  <rect x="60" y="80" width="1080" height="40" rx="8" fill="#161616"/>
  <rect x="60" y="108" width="1080" height="12" fill="#161616"/>
  <!-- Traffic lights -->
  <circle cx="92" cy="100" r="6" fill="#ff5f56"/>
  <circle cx="112" cy="100" r="6" fill="#ffbd2e"/>
  <circle cx="132" cy="100" r="6" fill="#27c93f"/>
  <!-- Title bar text -->
  <text x="600" y="106" font-family="monospace" font-size="13" fill="#555" text-anchor="middle">changelogs.info</text>
  <!-- Main headline -->
  <text x="140" y="210" font-family="monospace" font-size="18" fill="#33ff33" opacity="0.5">&gt;</text>
  <text x="160" y="210" font-family="monospace" font-size="48" font-weight="bold" fill="#33ff33">changelogs.info</text>
  <!-- Subtitle -->
  <text x="140" y="268" font-family="monospace" font-size="22" fill="#888">AI coding tool changelog tracker</text>
  <!-- Divider -->
  <rect x="140" y="295" width="60" height="2" fill="#33ff33" opacity="0.4"/>
  <!-- Feature row -->
  <text x="140" y="345" font-family="monospace" font-size="16" fill="#33ff33">●</text>
  <text x="162" y="345" font-family="monospace" font-size="16" fill="#666">track every release</text>
  <text x="400" y="345" font-family="monospace" font-size="16" fill="#00ffff">●</text>
  <text x="422" y="345" font-family="monospace" font-size="16" fill="#666">22 tools indexed</text>
  <text x="650" y="345" font-family="monospace" font-size="16" fill="#33ff33">●</text>
  <text x="672" y="345" font-family="monospace" font-size="16" fill="#666">auto-patches agent configs</text>
  <!-- clwatch badge -->
  <rect x="140" y="395" width="160" height="36" rx="4" fill="#33ff33" opacity="0.08" stroke="#33ff33" stroke-opacity="0.3" stroke-width="1"/>
  <text x="220" y="418" font-family="monospace" font-size="14" fill="#33ff33" text-anchor="middle">$ clwatch diff</text>
  <rect x="320" y="395" width="200" height="36" rx="4" fill="#00ffff" opacity="0.06" stroke="#00ffff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="420" y="418" font-family="monospace" font-size="14" fill="#00ffff" text-anchor="middle">$ clwatch refresh</text>
  <!-- Bottom URL -->
  <text x="140" y="505" font-family="monospace" font-size="15" fill="#444">https://changelogs.info</text>
</svg>
